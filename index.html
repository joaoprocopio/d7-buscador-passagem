		<nav class="nt">

			</div>
			<div class="nt-itm-ct">

		<main>
			<div class="header-ct">
				<header>
					<h1>Viagens de ônibus mais baratas que a passagem da rodoviária</h1>
					<h2>Sem taxas, com segurança e preço justo</h2>
				</header>
			</div>
			<div class="fm-ct">
				<form autocomplete="off">
					<div class="fm-ct-rw">
						<label>Saindo de</label>
						<div>
							<img src="./img/ico-content/circle.svg" alt="circle.svg" />
							<input placeholder="Digite uma cidade" />
							<a href="./">
								<img src="./img/ico-content/arrow.svg" alt="arrow.svg" />
							</a>
						</div>
					</div>
					<div class="fm-ct-rw">
						<label>Indo para</label>
						<div>
							<img src="./img/ico-content/local.svg" alt="local.svg" />
							<input placeholder="Digite uma cidade" />
						</div>
					</div>
					<div class="fm-ct-rw">
						<label>Data de ida</label>
						<div>
							<img src="./img/ico-content/calendar.svg" alt="calendar.svg" />
							<input placeholder="Ida" />
						</div>
					</div>
					<div class="fm-ct-rw">
						<label>Data de volta</label>
						<div>
							<img src="./img/ico-content/calendar.svg" alt="calendar.svg" />
							<input placeholder="Volta" />
						</div>
					</div>
					<button class="fm-ct-btn">
						<img src="./img/ico-content/find.svg" alt="find.svg" />
						Buscar
					</button>
				</form>
			</div>
		</main>
