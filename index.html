	<body>
		<div class="nt-ct">
			<nav class="nt">
				<div class="nt-lg-ct">
					<a class="nt-lg" href="./">
						<img src="./img/ico-top/buser.svg" alt="buser.svg" />
					</a>
				</div>
				<div class="nt-itm-ct">
					<a class="nt-bell" href="./">
						<img src="./img/ico-top/bell.svg" alt="bell.svg" />
					</a>
					<a class="nt-avt" href="./">
						<img src="./img/ico-top/avatar1.png" alt="avatar.png" />
					</a>
				</div>
			</nav>
		</div>
		<main>
			<div class="h">
				<header class="h-ct">
					<h1>Viagens de ônibus mais baratas que a passagem da rodoviária</h1>
					<h2>Sem taxas, com segurança e preço justo</h2>
				</header>
			</div>
			<div class="fm">
				<form class="fm-ct" autocomplete="off">
					<div class="fm-ct-cl">
						<label>Saindo de</label>
						<div class="fm-ct-rw">
							<img
								class="fm-w12"
								src="./img/ico-content/circle.svg"
								alt="circle.svg"
							/>
							<input placeholder="Digite uma cidade" />
							<a href="./">
								<img
									class="fm-w14"
									src="./img/ico-content/arrow.svg"
									alt="arrow.svg"
								/>
							</a>
						</div>
					</div>
					<div class="fm-ct-cl">
						<label>Indo para</label>
						<div class="fm-ct-rw">
							<img
								class="fm-w12"
								src="./img/ico-content/local.svg"
								alt="local.svg"
							/>
							<input placeholder="Digite uma cidade" />
						</div>
					</div>
					<div class="fm-ct-cl">
						<label>Data de ida</label>
						<div class="fm-ct-rw">
							<img
								class="fm-w14"
								src="./img/ico-content/calendar.svg"
								alt="calendar.svg"
							/>
							<input placeholder="Ida" />
						</div>
					</div>
					<div class="fm-ct-cl">
						<label>Data de volta</label>
						<div class="fm-ct-rw">
							<img
								class="fm-w14"
								src="./img/ico-content/calendar.svg"
								alt="calendar.svg"
							/>
							<input placeholder="Volta" />
						</div>
					</div>
					<button type="submit" class="fm-ct-btn">
						<img src="./img/ico-content/find.svg" alt="find.svg" />
						Buscar
					</button>
				</form>
			</div>
		</main>
